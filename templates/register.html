<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - WhatsApp Clone</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 400px; padding: 40px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo i { font-size: 60px; color: #25D366; background: #f0f0f0; padding: 20px; border-radius: 50%; }
        h2 { text-align: center; color: #333; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #999; }
        .input-group input { width: 100%; padding: 12px 15px 12px 45px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; transition: all 0.3s; }
        .input-group input:focus { outline: none; border-color: #25D366; }
        button { width: 100%; padding: 12px; background: #25D366; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        button:hover { background: #128C7E; transform: translateY(-2px); }
        .login-link { text-align: center; margin-top: 20px; color: #666; }
        .login-link a { color: #25D366; text-decoration: none; font-weight: bold; }
        .error { background: #fee; color: #c33; padding: 10px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="register-container">
       <div class="logo">
    <img src="{{ url_for('static', filename='logo.png') }}" width="80">
</div>
        <h2>Create Account</h2>
        <div class="subtitle">Join WhatsApp Clone today</div>
        {% if error %}
        <div class="error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="input-group"><i class="fas fa-user"></i><input type="text" name="username" placeholder="Username" required></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" name="password" placeholder="Password" required></div>
            <button type="submit">Register</button>
        </form>
        <div class="login-link">Already have an account? <a href="/login">Login here</a></div>
    </div>
</body>
</html>
